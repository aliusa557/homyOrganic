<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 150" role="img" aria-labelledby="hoTitle hoDesc">
  <title id="hoTitle">Homy Organic</title>
  <desc id="hoDesc">Homy Organic logo mark — a soft leaf emblem beside the wordmark.</desc>
  <defs>
    <linearGradient id="hoLeaf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8fbb70"/>
      <stop offset="1" stop-color="#3c6b45"/>
    </linearGradient>
  </defs>

  <g transform="translate(30 39)">
    <circle cx="42" cy="42" r="42" fill="url(#hoLeaf)"/>
    <ellipse cx="45" cy="41" rx="16" ry="27" transform="rotate(-28 45 41)" fill="#fbf6ec"/>
    <path d="M45 41 L45 65" transform="rotate(-28 45 41)" stroke="#3c6b45" stroke-width="2" stroke-linecap="round" opacity=".5"/>
  </g>

  <text x="142" y="64" font-family="'Montserrat', Arial, Helvetica, sans-serif" font-size="38" font-weight="700" fill="#221d18">Homy</text>
  <text x="141" y="106" font-family="'Montserrat', Arial, Helvetica, sans-serif" font-size="42" font-weight="800" fill="#221d18">Organic</text>
  <text x="143" y="128" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="700" letter-spacing="3" fill="#9c8768">PURE &#183; NATURAL &#183; PREMIUM</text>
</svg>
