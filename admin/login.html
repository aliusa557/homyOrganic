<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | Homy Organic</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body class="admin-body">

  <div class="auth-screen">
    <div class="auth-card">
      <img src="../assets/brand/homy-organic-logo.webp" alt="Homy Organic">
      <h1>Admin Login</h1>
      <p class="subtitle">Sign in to manage products, bundles and orders.</p>

      <div class="auth-error" data-login-error></div>

      <form data-login-form>
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" required autocomplete="username">
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary full" data-login-submit>Sign In</button>
      </form>
    </div>
  </div>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-client.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
