<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/webp" href="../assets/brand/homy-organic-logo.webp">
  <title>Value Packs | Homy Organic Admin</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body class="admin-body">

  <div class="admin-shell">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <img src="../assets/brand/homy-organic-logo.webp" alt="Homy Organic">
        <span>Homy Organic</span>
      </div>

      <nav class="sidebar-nav">
        <a href="index.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="8" height="8" rx="2"></rect><rect x="13" y="3" width="8" height="8" rx="2"></rect><rect x="3" y="13" width="8" height="8" rx="2"></rect><rect x="13" y="13" width="8" height="8" rx="2"></rect></svg>
          Dashboard
        </a>
        <a href="products.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 8 12 3 3 8v8l9 5 9-5V8Z"></path><path d="M3 8l9 5 9-5"></path><path d="M12 13v8"></path></svg>
          Products
        </a>
        <a href="bundles.html" class="active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="9" width="18" height="12" rx="2"></rect><path d="M3 9V7a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v2"></path><path d="M12 5v16"></path></svg>
          Value Packs
        </a>
        <a href="orders.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 3h12v18l-3-2-3 2-3-2-3 2V3Z"></path><path d="M9 8h6M9 12h6"></path></svg>
          Orders
        </a>
        <a href="offers.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20.59 13.41 11 3.83A2 2 0 0 0 9.59 3.24L4 3a1 1 0 0 0-1 1l.24 5.59a2 2 0 0 0 .59 1.41l9.58 9.59a2 2 0 0 0 2.83 0l4.35-4.35a2 2 0 0 0 0-2.83Z"></path><circle cx="7.5" cy="7.5" r="1.5"></circle></svg>
          Offers
        </a>
        <a href="settings.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"></path></svg>
          Settings
        </a>
      </nav>

      <div class="sidebar-footer">
        <span class="admin-email" data-admin-email>...</span>
        <button class="btn btn-outline full small" data-logout>Logout</button>
      </div>
    </aside>

    <div class="sidebar-backdrop" data-sidebar-backdrop></div>
    <div class="main-area">
      <header class="topbar">
        <button class="admin-menu-toggle" data-admin-menu-toggle aria-label="Open menu">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 6h18"></path><path d="M3 12h18"></path><path d="M3 18h18"></path></svg>
        </button>
        <div>
          <h1>Value Packs</h1>
          <p>Manage bundled product offers.</p>
        </div>
        <button class="btn btn-gold" data-add-bundle>+ Add Value Pack</button>
      </header>

      <main class="content">
        <div class="panel">
          <div class="panel-header">
            <h2>All Value Packs</h2>
          </div>
          <table class="data-table">
            <thead>
              <tr>
                <th>Value Pack</th>
                <th>Price</th>
                <th>Status</th>
                <th></th>
              </tr>
            </thead>
            <tbody data-bundles-table>
              <tr class="empty-row"><td colspan="4">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </main>
    </div>
  </div>

  <!-- Add / Edit Bundle Modal -->
  <div class="modal-overlay" data-bundle-modal>
    <div class="modal">
      <div class="modal-header">
        <h2 data-modal-title>Add Value Pack</h2>
        <button class="modal-close" data-close-modal>&times;</button>
      </div>

      <form data-bundle-form>
        <input type="hidden" data-field="id">

        <div class="form-grid">
          <div class="field span-2">
            <label>Image</label>
            <div class="image-upload-row">
              <img class="image-preview" data-image-preview src="" alt="">
              <input type="file" accept=".webp,image/webp" data-field="imageFile">
            </div>
            <input type="hidden" data-field="image">
          </div>

          <div class="field">
            <label>Name *</label>
            <input type="text" data-field="name" required>
          </div>
          <div class="field">
            <label>Slug *</label>
            <input type="text" data-field="slug" required>
          </div>

          <div class="field">
            <label>Tag</label>
            <input type="text" data-field="tag" placeholder="e.g. 30% OFF">
          </div>
          <div class="field">
            <label>Bundle Price (Rs.) *</label>
            <input type="number" step="0.01" data-field="price" required>
          </div>

          <div class="field">
            <label>Original Price (Rs.)</label>
            <input type="number" step="0.01" data-field="originalPrice">
          </div>
          <div class="field">
            <label>Savings (Rs.)</label>
            <input type="number" step="0.01" data-field="savings">
          </div>

          <div class="field">
            <label>Rating (0-5)</label>
            <input type="number" step="0.1" min="0" max="5" data-field="rating">
          </div>
          <div class="field">
            <label>Review Count</label>
            <input type="number" step="1" min="0" data-field="reviewCount">
          </div>

          <div class="field span-2">
            <label>Description</label>
            <textarea data-field="description"></textarea>
          </div>

          <div class="field span-2">
            <label>Included Items</label>
            <div data-item-rows></div>
            <button type="button" class="btn btn-soft small" data-add-item>+ Add Item</button>
          </div>

          <div class="field span-2 toggle-row">
            <input type="checkbox" id="isActive" data-field="isActive" checked>
            <label for="isActive" style="margin:0;">Active (visible on the shop)</label>
          </div>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-outline" data-close-modal>Cancel</button>
          <button type="submit" class="btn btn-primary" data-save-bundle>Save Value Pack</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-client.js"></script>
  <script src="js/admin-utils.js"></script>
  <script src="js/admin-auth.js"></script>
  <script src="js/bundles-admin.js"></script>
</body>
</html>
