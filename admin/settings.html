<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/webp" href="../assets/brand/homy-organic-logo.webp">
  <title>Settings | Homy Organic Admin</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body class="admin-body">

  <div class="admin-shell">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <img src="../assets/brand/homy-organic-logo.webp" alt="Homy Organic">
        <span>Homy Organic</span>
      </div>

      <nav class="sidebar-nav">
        <a href="index.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="8" height="8" rx="2"></rect><rect x="13" y="3" width="8" height="8" rx="2"></rect><rect x="3" y="13" width="8" height="8" rx="2"></rect><rect x="13" y="13" width="8" height="8" rx="2"></rect></svg>
          Dashboard
        </a>
        <a href="products.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 8 12 3 3 8v8l9 5 9-5V8Z"></path><path d="M3 8l9 5 9-5"></path><path d="M12 13v8"></path></svg>
          Products
        </a>
        <a href="bundles.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="9" width="18" height="12" rx="2"></rect><path d="M3 9V7a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v2"></path><path d="M12 5v16"></path></svg>
          Value Packs
        </a>
        <a href="orders.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 3h12v18l-3-2-3 2-3-2-3 2V3Z"></path><path d="M9 8h6M9 12h6"></path></svg>
          Orders
        </a>
        <a href="offers.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20.59 13.41 11 3.83A2 2 0 0 0 9.59 3.24L4 3a1 1 0 0 0-1 1l.24 5.59a2 2 0 0 0 .59 1.41l9.58 9.59a2 2 0 0 0 2.83 0l4.35-4.35a2 2 0 0 0 0-2.83Z"></path><circle cx="7.5" cy="7.5" r="1.5"></circle></svg>
          Offers
        </a>
        <a href="settings.html" class="active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"></path></svg>
          Settings
        </a>
      </nav>

      <div class="sidebar-footer">
        <span class="admin-email" data-admin-email>...</span>
        <button class="btn btn-outline full small" data-logout>Logout</button>
      </div>
    </aside>

    <div class="sidebar-backdrop" data-sidebar-backdrop></div>
    <div class="main-area">
      <header class="topbar">
        <button class="admin-menu-toggle" data-admin-menu-toggle aria-label="Open menu">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 6h18"></path><path d="M3 12h18"></path><path d="M3 18h18"></path></svg>
        </button>
        <div>
          <h1>Settings</h1>
          <p>Control branding, hero section, footer and site colors.</p>
        </div>
        <button class="btn btn-gold" data-save-settings>Save Settings</button>
      </header>

      <main class="content">
        <form data-settings-form>
          <details class="panel accordion-panel" open>
            <summary class="panel-header accordion-summary">
              <h2>Branding</h2>
              <svg class="accordion-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 9l6 6 6-6"></path></svg>
            </summary>
            <div class="accordion-body">
              <div class="form-grid">
                <div class="field span-2">
                  <label>Brand Name</label>
                  <input type="text" data-field="brandName">
                </div>

                <div class="field">
                  <label>Header Logo</label>
                  <div class="image-upload-row">
                    <img class="image-preview" data-image-preview="logo" src="" alt="">
                    <input type="file" accept=".webp,image/webp" data-field="logoFile">
                  </div>
                  <input type="hidden" data-field="logoUrl">
                </div>

                <div class="field">
                  <label>Footer Logo</label>
                  <div class="image-upload-row">
                    <img class="image-preview" data-image-preview="logoFooter" src="" alt="">
                    <input type="file" accept=".webp,image/webp" data-field="logoFooterFile">
                  </div>
                  <input type="hidden" data-field="logoFooterUrl">
                </div>
              </div>
            </div>
          </details>

          <details class="panel accordion-panel">
            <summary class="panel-header accordion-summary">
              <h2>Hero Section</h2>
              <svg class="accordion-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 9l6 6 6-6"></path></svg>
            </summary>
            <div class="accordion-body">
              <div class="field span-2" style="margin-bottom: 18px;">
                <label>Hero Heading</label>
                <input type="text" data-field="heroHeading" placeholder="Where Beauty Meets Wellness">
              </div>

              <label class="hint" style="display:block; margin-bottom: 10px;">Hero Slider Images</label>
              <div data-hero-slide-rows></div>
              <button type="button" class="btn btn-soft small" data-add-slide>+ Add Slide</button>
            </div>
          </details>

          <details class="panel accordion-panel">
            <summary class="panel-header accordion-summary">
              <h2>Footer &amp; Contact</h2>
              <svg class="accordion-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 9l6 6 6-6"></path></svg>
            </summary>
            <div class="accordion-body">
              <div class="form-grid">
                <div class="field span-2">
                  <label>Footer Tagline</label>
                  <input type="text" data-field="footerTagline">
                </div>
                <div class="field span-2">
                  <label>Footer About Text</label>
                  <textarea data-field="footerAbout"></textarea>
                </div>

                <div class="field">
                  <label>WhatsApp Number</label>
                  <input type="text" data-field="whatsappNumber" placeholder="923001234567">
                </div>
                <div class="field">
                  <label>Support Email</label>
                  <input type="email" data-field="supportEmail">
                </div>

                <div class="field">
                  <label>Easypaisa Number</label>
                  <input type="text" data-field="easypaisaNumber">
                </div>
                <div class="field">
                  <label>JazzCash Number</label>
                  <input type="text" data-field="jazzcashNumber">
                </div>

                <div class="field">
                  <label>Instagram URL</label>
                  <input type="text" data-field="socialInstagram">
                </div>
                <div class="field">
                  <label>Facebook URL</label>
                  <input type="text" data-field="socialFacebook">
                </div>
                <div class="field">
                  <label>TikTok URL</label>
                  <input type="text" data-field="socialTiktok">
                </div>
              </div>
            </div>
          </details>

          <details class="panel accordion-panel">
            <summary class="panel-header accordion-summary">
              <h2>Theme Colors</h2>
              <svg class="accordion-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 9l6 6 6-6"></path></svg>
            </summary>
            <div class="accordion-body">
              <label class="hint" style="display:block; margin-bottom: 10px;">Quick Themes — click to apply, then Save Settings</label>
              <div class="theme-preset-grid" data-theme-presets></div>

              <div class="theme-section-divider">Or customize individual colors</div>

              <button type="button" class="btn btn-outline small" data-reset-theme style="margin-bottom: 16px;">Reset to Defaults</button>
              <div class="form-grid" data-theme-grid></div>
            </div>
          </details>
        </form>
      </main>
    </div>
  </div>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-client.js"></script>
  <script src="js/admin-utils.js"></script>
  <script src="js/admin-auth.js"></script>
  <script src="js/settings-admin.js"></script>
</body>
</html>
